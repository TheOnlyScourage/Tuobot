# Tuobot CI — ruff lint + docker build.
#
# Runs on every push and every PR against main. Two independent
# jobs so they fan out in parallel; either one failing blocks
# the PR. Nothing here deploys anywhere — deployment is still manual
# via `railway up --ci`.
#
# (A pytest job used to live here but there is no tests/ folder in the
# repo, so it only ever errored. Removed until real tests exist — to
# re-add, restore a `test` job running `pytest tests/ -v` once a tests/
# directory with a conftest.py is in place.)
#
# Python version is pinned to 3.11 to match the Dockerfile
# (FROM python:3.11-slim). If the Dockerfile moves, bump this too.
name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  lint:
    name: ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install ruff
        # Pin ruff so a silent upgrade doesn't start failing CI out of
        # nowhere. Bump deliberately.
        run: pip install ruff==0.14.4
      - name: Run ruff
        run: ruff check .
  docker:
    name: docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        # Validates the Dockerfile still produces a clean image. This
        # is what Railway runs on every deploy — catching breakage
        # here saves a failed deploy round-trip.
        run: docker build -t tuobot:ci .
