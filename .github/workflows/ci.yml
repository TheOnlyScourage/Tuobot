# Tuobot CI — ruff lint + pytest + docker build.
#
# Runs on every push and every PR against main. Three independent
# jobs so they fan out in parallel; any one failing blocks
# the PR. Nothing here deploys anywhere — deployment is still manual
# via `railway up --ci`.
#
# The test job runs tests/ — regression suites for the two pure modules
# (bot/stats/mmr_engine.py and bot/match/captain_selection.py). The
# conftest loads them via importlib with a stubbed `bot` package, so the
# job needs NO bot dependencies: no nextcord, no aiomysql, no database.
# Just pytest. Keep it that way — if a new test needs the full
# requirements.txt, it probably belongs in a different kind of harness.
#
# Python version is pinned to 3.11 to match the Dockerfile
# (FROM python:3.11-slim). If the Dockerfile moves, bump this too.
name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  lint:
    name: ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install ruff
        # Pin ruff so a silent upgrade doesn't start failing CI out of
        # nowhere. Bump deliberately.
        run: pip install ruff==0.14.4
      - name: Run ruff
        run: ruff check .
  test:
    name: pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install pytest
        # Pinned like ruff — bump deliberately. The suite needs no other
        # dependencies (see the header comment).
        run: pip install pytest==9.1.1
      - name: Run tests
        run: pytest tests/ -v
  docker:
    name: docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        # Validates the Dockerfile still produces a clean image. This
        # is what Railway runs on every deploy — catching breakage
        # here saves a failed deploy round-trip.
        run: docker build -t tuobot:ci .
